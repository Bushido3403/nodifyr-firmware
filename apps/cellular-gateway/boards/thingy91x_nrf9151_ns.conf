# Board fragment for thingy91x/nrf9151/ns (PCA20065 / Thingy:91 X)
#
# Factory static partitions give TF-M only ~32 KB and no ITS/PS areas.
# SMALL profile (used on the nRF9151 DK) fails to build here.

CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# Increase modem heap slightly for TLS + DNS
CONFIG_NRF_MODEM_LIB_SHMEM_TX_SIZE=8192
CONFIG_NRF_MODEM_LIB_SHMEM_RX_SIZE=8192
