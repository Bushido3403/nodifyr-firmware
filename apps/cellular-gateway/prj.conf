# Nodifyr cellular gateway — nRF9151 / NCS v3.4.0

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_NODIFYR_LOG_LEVEL_INF=y

CONFIG_ASSERT=y
CONFIG_REBOOT=y

# Stacks / heap (HTTPS + cJSON + settings)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_POSIX_API=y

# Modem + LTE (Hologram APN, IPv4)
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PDN_MODULE=y
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=y
CONFIG_LTE_LC_PDN_DEFAULT_APN="hologram"
CONFIG_LTE_LC_PDN_DEFAULT_FAM_IPV4=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y
CONFIG_MODEM_KEY_MGMT=y
CONFIG_MODEM_INFO=y
CONFIG_AT_MONITOR=y

# Networking (modem offload)
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_HTTP_CLIENT=y

# Wall-clock for telemetry ts (epoch ms)
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_MODEM=y
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_AUTO_UPDATE=y

# Credentials persistence
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# JSON
CONFIG_CJSON_LIB=y

# Entropy for any TLS/socket needs
CONFIG_ENTROPY_GENERATOR=y

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Lab bring-up only: seeds Settings/NVS when flash has no pairing_secret.
# Enter this same code under Devices → Pair device on app.nodifyr.io.
# Clear or leave empty for production factory provisioning.
CONFIG_NODIFYR_PAIRING_SECRET="NODI-FYR1-DK91-BRNG"
